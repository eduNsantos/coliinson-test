info:
  name: Get rank
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/graphql"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |2-
      
            {
              "query": "query GetRanking($input: GetRankingInput!) { ranking(input: $input) { date ranking { activity score } } }",
              "variables": {
                "input": {
                  "search": "{{rankingSearch}}"
                }
              }
            }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
